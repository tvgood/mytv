name: Build APK

on:
 workflow_dispatch:
    inputs:
      build_type:
        description: 'release'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
     

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read  
    steps:
    - name: Checkout main repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
          
    - name: Set executable permission for gradlew
      run: chmod +x gradlew    

    - name: Checkout Keystore Repository
      uses: actions/checkout@v4
      with:
        repository: tvgood/keystore-repo  
        token: ${{ secrets.TOKEN }}
        path: keystore

    - name: Setup signing configuration
      run: |
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > gradle.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> gradle.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties

        

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'zulu'

    - name: Build with Gradle
      run: ./gradlew assembleRelease
      


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
