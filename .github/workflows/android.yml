name: Build APK

on:
 workflow_dispatch:
    inputs:
      build_type:
        description: 'release'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
     

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read  
    steps:
    - name: Checkout main repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
          
    - name: Set executable permission for gradlew
      run: chmod +x gradlew    

    - name: Checkout Keystore Repository
      uses: actions/checkout@v4
      with:
        repository: tvgood/keystore-repo  
        token: ${{ secrets.TOKEN }}
        path: keystore

    - name: Setup signing configuration
      run: |
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > gradle.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> gradle.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "Generated gradle.properties:"
        cat gradle.properties

    - name: Verify Gradle properties
      run: |
        echo "Gradle properties:"
        ./gradlew -q properties | grep -E "storePassword|keyAlias|keyPassword"
        echo "File exists: keystore/github.jks"
        ls -l keystore/github.jks    

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'zulu'

    - name: Fix build.gradle path
      run: |
        sed -i "s|storeFile file('keystore/github.jks')|storeFile file('../keystore/github.jks')|g" app/build.gradle
        echo "Updated build.gradle:"
        cat app/build.gradle | grep storeFile

    - name: Build with Gradle
      run: ./gradlew assembleRelease
      
    - name: Verify APK signature
      run: |
        jarsigner -verify -verbose -certs app/build/outputs/apk/release/*.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
