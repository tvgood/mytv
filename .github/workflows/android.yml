name: Build APK

on:
 workflow_dispatch:
    inputs:
      build_type:
        description: 'release'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
     

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read  
    steps:
    - name: Checkout main repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
          
    - name: Set executable permission for gradlew
      run: chmod +x gradlew    

    - name: Checkout Keystore Repository
      uses: actions/checkout@v4
      with:
        repository: tvgood/keystore-repo  
        token: ${{ secrets.TOKEN }}
        path: keystore

    - name: Setup signing configuration
      run: |
    
       if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
       echo "ERROR: KEYSTORE_PASSWORD secret is empty!"
         exit 1
       fi
       if [ -z "${{ secrets.KEY_ALIAS }}" ]; then
       echo "ERROR: KEY_ALIAS secret is empty!"
         exit 1
       fi
       if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then
       echo "ERROR: KEY_PASSWORD secret is empty!"
         exit 1
       fi

       printf "storePassword=%s\n" "${{ secrets.KEYSTORE_PASSWORD }}" > gradle.properties
       printf "keyAlias=%s\n" "${{ secrets.KEY_ALIAS }}" >> gradle.properties
       printf "keyPassword=%s\n" "${{ secrets.KEY_PASSWORD }}" >> gradle.properties
       printf "android.useAndroidX=true\n" >> gradle.properties
  
       echo "=== GENERATED GRADLE.PROPERTIES ==="
       cat gradle.properties
       echo "=================================="

    - name: Verify Gradle properties
      run: |
       echo "=== GRADLE PROPERTIES VERIFICATION ==="
       echo "Current directory: $(pwd)"
       echo "File exists: $(ls -l gradle.properties)"
       echo "File content:"
       cat gradle.properties
       echo "Gradle properties read by Gradle:"
       ./gradlew -q properties | grep -E "storePassword|keyAlias|keyPassword"
       echo "===================================="

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'zulu'

    - name: Fix build.gradle path
      run: |
       sed -i "s|storeFile file('keystore/github.jks')|storeFile file('../keystore/github.jks')|g" app/build.gradle
       echo "Updated build.gradle:"
       cat app/build.gradle | grep storeFile

    - name: Build with Gradle
      run: ./gradlew assembleRelease
      
    - name: Verify APK signature
      run: |
        jarsigner -verify -verbose -certs app/build/outputs/apk/release/*.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
