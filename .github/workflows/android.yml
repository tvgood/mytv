name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read  
    steps:
    - name: Checkout main repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Checkout Keystore Repository
      uses: actions/checkout@v4
      with:
        repository: tvgood/keystore-repo  
        token: ${{ secrets.GITHUB_TOKEN }}
        path: keystore

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'zulu'

    - name: Build with Gradle
      run: ./gradlew assembleRelease
